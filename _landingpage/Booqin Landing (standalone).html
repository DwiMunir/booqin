document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ing:-0.02em;color:#0E4D47;\">Booqin<\u002Fspan>\n    <\u002Fa>\n\n    <sc-if value=\"{{ showDesktopNav }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex;align-items:center;gap:30px;\">\n        <a href=\"#features\" style=\"font-weight:600;font-size:0.95rem;color:#3C4A47;transition:color .15s;\" style-hover=\"color:#0E4D47;\">Features<\u002Fa>\n        <a href=\"#how\" style=\"font-weight:600;font-size:0.95rem;color:#3C4A47;transition:color .15s;\" style-hover=\"color:#0E4D47;\">How it works<\u002Fa>\n        <a href=\"#faq\" style=\"font-weight:600;font-size:0.95rem;color:#3C4A47;transition:color .15s;\" style-hover=\"color:#0E4D47;\">FAQ<\u002Fa>\n        <a href=\"#waitlist\" style=\"display:inline-flex;align-items:center;gap:7px;background:#E0942E;color:#1c1206;font-weight:700;font-size:0.95rem;padding:10px 18px;border-radius:11px;box-shadow:0 5px 14px rgba(224,148,46,0.34);transition:transform .15s, box-shadow .15s;\" style-hover=\"transform:translateY(-1px);box-shadow:0 8px 18px rgba(224,148,46,0.42);\">Join the waitlist<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"{{ false }}\">\n      <button onclick=\"{{ toggleNav }}\" aria-label=\"Menu\" style=\"display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:11px;border:1px solid rgba(20,33,31,0.12);background:#fff;cursor:pointer;\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0E4D47\" stroke-width=\"1.8\" stroke-linecap=\"round\"><path d=\"M4 7h16M4 12h16M4 17h16\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fnav>\n\n  <sc-if value=\"{{ navOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"border-top:1px solid rgba(20,33,31,0.07);background:rgba(250,247,241,0.97);padding:10px 24px 18px;display:flex;flex-direction:column;gap:4px;\">\n      <a href=\"#features\" onclick=\"{{ closeNav }}\" style=\"padding:12px 4px;font-weight:600;border-bottom:1px solid rgba(20,33,31,0.06);\">Features<\u002Fa>\n      <a href=\"#how\" onclick=\"{{ closeNav }}\" style=\"padding:12px 4px;font-weight:600;border-bottom:1px solid rgba(20,33,31,0.06);\">How it works<\u002Fa>\n      <a href=\"#faq\" onclick=\"{{ closeNav }}\" style=\"padding:12px 4px;font-weight:600;border-bottom:1px solid rgba(20,33,31,0.06);\">FAQ<\u002Fa>\n      <a href=\"#waitlist\" onclick=\"{{ closeNav }}\" style=\"margin-top:8px;text-align:center;background:#E0942E;color:#1c1206;font-weight:700;padding:13px;border-radius:11px;\">Join the waitlist<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fheader>\n\n<!-- ===================== HERO ===================== -->\n<section id=\"hero\" style=\"position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(1100px 520px at 78% -8%, rgba(21,120,110,0.10), transparent 60%),radial-gradient(700px 420px at 6% 18%, rgba(224,148,46,0.08), transparent 60%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,92px) 24px clamp(56px,7vw,96px);display:flex;flex-wrap:wrap;gap:clamp(36px,5vw,64px);align-items:center;\">\n\n    <div style=\"flex:1 1 440px;min-width:300px;max-width:600px;\">\n      <div style=\"display:inline-flex;align-items:center;gap:9px;background:#EAF2F0;border:1px solid rgba(21,120,110,0.18);color:#0E4D47;font-weight:700;font-size:0.82rem;letter-spacing:0.01em;padding:7px 13px;border-radius:999px;margin-bottom:24px;\">\n        <span style=\"width:7px;height:7px;border-radius:50%;background:#15786E;animation:booqPulse 2s infinite;\"><\u002Fspan>\n        Now in early access · for venue owners\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2.5rem,5.4vw,4.1rem);line-height:1.04;letter-spacing:-0.025em;color:#11231F;margin:0 0 20px;text-wrap:balance;\">\n        Fill more dates.<br>Let your venue's<br><span style=\"color:#15786E;\">AI assistant<\u002Fspan> do the booking.\n      <\u002Fh1>\n      <p style=\"font-size:clamp(1.06rem,1.7vw,1.28rem);color:#4C5A56;max-width:520px;margin:0 0 30px;\">\n        List your space and hand the back-and-forth to Booqin. It answers inquiries instantly, qualifies leads, manages your calendar, and follows up — 24/7 — so you book more and chase less.\n      <\u002Fp>\n\n      <sc-if value=\"{{ heroNotSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ onHeroSubmit }}\" style=\"display:flex;flex-wrap:wrap;gap:10px;max-width:480px;\">\n          <input type=\"email\" value=\"{{ heroEmail }}\" oninput=\"{{ onHeroInput }}\" placeholder=\"you@yourvenue.com\" aria-label=\"Email address\" style=\"flex:1 1 220px;min-width:0;padding:15px 16px;border:1px solid #E2DBCD;border-radius:13px;font-size:1rem;color:#16211F;background:#fff;outline:none;transition:border .15s, box-shadow .15s;\" style-focus=\"border:1px solid #15786E;box-shadow:0 0 0 4px rgba(21,120,110,0.13);\">\n          <button type=\"submit\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#E0942E;color:#1c1206;font-weight:700;font-size:1rem;padding:15px 24px;border:none;border-radius:13px;cursor:pointer;box-shadow:0 7px 18px rgba(224,148,46,0.36);transition:transform .15s, box-shadow .15s, background .15s;\" style-hover=\"transform:translateY(-1px);background:#D2871F;box-shadow:0 10px 22px rgba(224,148,46,0.44);\">\n            Join the waitlist\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1c1206\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fform>\n        <sc-if value=\"{{ heroHasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"color:#C0392B;font-size:0.88rem;font-weight:600;margin:10px 2px 0;\">{{ hero 0px;border-radius:50%;background:#2f6e67;\"><\u002Fspan>\n          <span style=\"width:10px;height:10px;border-radius:50%;background:#2f6e67;\"><\u002Fspan>\n          <span style=\"margin-left:8px;color:#BFD6D1;font-size:0.78rem;font-weight:600;letter-spacing:0.02em;\">Booqin Dashboard — The Rooftop at Maple<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;\">\n          <!-- calendar panel -->\n          <div style=\"flex:1 1 200px;min-width:180px;padding:16px;border-right:1px solid rgba(20,33,31,0.07);background:#FCFAF6;\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n              <span style=\"font-weight:800;font-family:'Bricolage Grotesque',sans-serif;color:#11231F;\">June 2026<\u002Fspan>\n              <span style=\"font-size:0.7rem;font-weight:700;color:#15786E;background:#EAF2F0;padding:3px 8px;border-radius:6px;\">18 booked<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:8px;\">\n              <div style=\"display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;background:#EAF2F0;border:1px solid rgba(21,120,110,0.14);\">\n                <span style=\"font-size:0.72rem;font-weight:800;color:#15786E;width:26px;\">FRI<\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:0.8rem;font-weight:700;color:#11231F;\">Corporate mixer<\u002Fdiv><div style=\"font-size:0.7rem;color:#7A857F;\">Jun 13 · 6–10 PM<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;background:#fff;border:1px dashed rgba(224,148,46,0.5);\">\n                <span style=\"font-size:0.72rem;font-weight:800;color:#D2871F;width:26px;\">SAT<\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:0.8rem;font-weight:700;color:#11231F;\">Hold · wedding<\u002Fdiv><div style=\"font-size:0.7rem;color:#D2871F;\">Jun 14 · pending confirm<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;background:#fff;border:1px solid rgba(20,33,31,0.08);\">\n                <span style=\"font-size:0.72rem;font-weight:800;color:#9AA39F;width:26px;\">SUN<\u002Fspan>\n                <div style=\"flex:1;\"><div style=\"font-size:0.8rem;font-weight:700;color:#11231F;\">Open<\u002Fdiv><div style=\"font-size:0.7rem;color:#7A857F;\">Jun 15 · available<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- chat panel -->\n          <div ref=\"{{ heroChatRef }}\" style=\"flex:1.15 1 230px;min-width:210px;padding:14px;display:flex;flex-direction:column;gap:10px;background:#fff;\">\n            <div style=\"display:flex;align-items:center;gap:9px;padding-bottom:10px;border-bottom:1px solid rgba(20,33,31,0.07);\">\n              <span style=\"width:30px;height:30px;border-radius:9px;background:#0E4D47;display:flex;align-items:center;justify-content:center;\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#E0942E\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a8 8 0 0 1-11.5 7.2L4 21l1.8-5.5A8 8 0 1 1 21 12Z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div><div style=\"font-size:0.82rem;font-weight:800;color:#11231F;\">AI Assistant<\u002Fdiv><div style=\"display:flex;align-items:center;gap:5px;font-size:0.68rem;color:#15786E;font-weight:700;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#15786E;animation:booqPulse 2s infinite;\"><\u002Fspan>Online · replying<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"align-self:flex-end;max-width:88%;background:#EAF2F0;color:#16302C;border-radius:14px 14px 4px 14px;padding:9px 12px;font-size:0.8rem;\">Is the rooftop free Sat Jun 14 for ~80 people?<\u002Fdiv>\n            <div style=\"align-self:flex-start;max-width:90%;background:#0E4D47;color:#EAF4F2;border-radius:14px 14px 14px 4px;padding:9px 12px;font-size:0.8rem;\">Yes — the rooftop is open Jun 14 and seats up to 100. Evening rate is <b style=\"color:#F2C079;\">$1,800<\u002Fb>. Want me to hold the date?<\u002Fdiv>\n            <div style=\"align-self:flex-start;max-width:92%;background:#FCFAF6;border:1px solid rgba(20,33,31,0.09);border-radius:12px;padding:10px 12px;\">\n              <div style=\"display:flex;align-items:center;gap:7px;font-size:0.7rem;font-weight:800;color:#15786E;margin-bottom:4px;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#15786E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4L19 7\"><\u002Fpath><\u002Fsvg>AVAILABILITY CONFIRMED<\u002Fdiv>\n              <div style=\"font-size:0.8rem;font-weight:700;color:#11231F;\">Sat, Jun 14 · 6–11 PM · Rooftop<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PROBLEM ===================== -->\n<section id=\"problem\" style=\"background:#fff;border-top:1px solid rgba(20,33,31,0.06);\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:clamp(64px,8vw,108px) 24px;\">\n    <div data-reveal=\"\" style=\"max-width:680px;margin:0 auto 52px;text-align:center;\">\n      <div style=\"font-weight:800;font-size:0.82rem;letter-spacing:0.08em;color:#D2871F;text-transform:uppercase;margin-bottom:14px;\">The booking grind<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(1.9rem,3.6vw,2.85rem);line-height:1.1;letter-spacing:-0.02em;color:#11231F;margin:0 0 16px;text-wrap:balance;\">Every missed reply is an empty date you can't get back.<\u002Fh2>\n      <p style=\"font-size:clamp(1.02rem,1.5vw,1.18rem);color:#4C5A56;margin:0;\">Inquiries arrive at all hours. Answer late and people book elsewhere. Run it by hand and the calendar turns into guesswork.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px;\">\n      <div data-reveal=\"\" style=\"background:#FCFAF6;border:1px solid rgba(20,33,31,0.08);border-radius:18px;padding:28px;\">\n        <div style=\"width:48px;height:48px;border-radius:13px;background:#FBEAD2;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C77E1C\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2.5\"><\u002Frect><path d=\"M3.5 6.5 12 13l8.5-6.5\"><\u002Fpath><circle cx=\"19\" cy=\"6\" r=\"3\" fill=\"#C77E1C\" stroke=\"none\"><\u002Fcircle><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.22rem;color:#11231F;margin:0 0 9px;\">Inquiries slip through<\u002Fh3>\n        <p style=\"color:#5C6A66;font-size:0.98rem;margin:0;\">Emails, DMs, calls, form fills — they pile up across five places, and the good leads get buried before you ever see them.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"90\" style=\"background:#FCFAF6;border:1px solid rgba(20,33,31,0.08);border-radius:18px;padding:28px;\">\n        <div style=\"width:48px;height:48px;border-radius:13px;background:#FBEAD2;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C77E1C\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"8.5\"><\u002Fcircle><path d=\"M12 7.5V12l3.5 2\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.22rem;color:#11231F;margin:0 0 9px;\">Slow replies lose bookings<\u002Fh3>\n        <p style=\"color:#5C6A66;font-size:0.98rem;margin:0;\">The venue that answers first usually wins. By the time you reply between events, your prospect has already booked somewhere else.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" data-reveal-delay=\"180\" style=\"background:#FCFAF6;border:1px solid rgba(20,33,31,0.08);border-radius:18px;padding:28px;\">\n        <div style=\"width:48px;height:48px;border-radius:13px;background:#FBEAD2;display:flex;align-items:center;justify-content:center;margin-bottom:18px;\"><svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C77E1C\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4.5\" width=\"18\" height=\"16\" rx=\"2.5\"><\u002Frect><path d=\"M3 9h18M8 2.5v4M16 2.5v4\"><\u002Fpath><path d=\"M12 12.5v3M12 18h.01\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <h3 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.22rem;color:#11231F;margin:0 0 9px;\">Double-bookings &amp; chaos<\u002Fh3>\n        <p style=\"color:#5C6A66;font-size:0.98rem;margin:0;\">Holds, deposits, reschedules across multiple spaces — one missed update and two parties show up for the same room.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== AI SPOTLIGHT ===================== -->\n<section id=\"ai\" style=\"background:#0E4D47;color:#EAF4F2;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(700px 380px at 88% 0%, rgba(224,148,46,0.16), transparent 60%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;padding:clamp(64px,8vw,112px) 24px;\">\n    <div data-reveal=\"\" style=\"max-width:720px;margin:0 0 48px;\">\n      <div style=\"font-weight:800;font-size:0.82rem;letter-spacing:0.08em;color:#F2C079;text-transform:uppercase;margin-bottom:14px;\">Meet you style=\"font-weight:700;color:#11231F;font-size:0.92rem;\">Lena Brooks<\u002Fdiv><div style=\"font-size:0.82rem;color:#7A857F;\">Atelier Studios · Chicago<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div data-reveal=\"\" style=\"display:flex;flex-wrap:wrap;justify-content:center;gap:14px 30px;align-items:center;opacity:0.9;\">\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9282;border:1px dashed #CFC6B4;border-radius:8px;padding:8px 16px;\">Lumen Hall<\u002Fspan>\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9282;border:1px dashed #CFC6B4;border-radius:8px;padding:8px 16px;\">Coastline Pavilion<\u002Fspan>\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9282;border:1px dashed #CFC6B4;border-radius:8px;padding:8px 16px;\">The Foundry<\u002Fspan>\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9282;border:1px dashed #CFC6B4;border-radius:8px;padding:8px 16px;\">Sky Courts Co.<\u002Fspan>\n      <span style=\"font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#9A9282;border:1px dashed #CFC6B4;border-radius:8px;padding:8px 16px;\">Verde Studios<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FAQ ===================== -->\n<section id=\"faq\" style=\"background:#fff;border-top:1px solid rgba(20,33,31,0.06);\">\n  <div style=\"max-width:760px;margin:0 auto;padding:clamp(64px,8vw,104px) 24px;\">\n    <div data-reveal=\"\" style=\"text-align:center;margin-bottom:44px;\">\n      <div style=\"font-weight:800;font-size:0.82rem;letter-spacing:0.08em;color:#D2871F;text-transform:uppercase;margin-bottom:14px;\">Questions<\u002Fdiv>\n      <h2 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(1.9rem,3.6vw,2.7rem);line-height:1.1;letter-spacing:-0.02em;color:#11231F;margin:0;\">Good to know before you join.<\u002Fh2>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"display:flex;flex-direction:column;gap:12px;\">\n      <sc-for list=\"{{ faqs }}\" as=\"item\" hint-placeholder-count=\"5\">\n        <div style=\"border:1px solid rgba(20,33,31,0.1);border-radius:14px;overflow:hidden;background:#FCFAF6;\">\n          <button onclick=\"{{ item.onToggle }}\" style=\"width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;text-align:left;padding:18px 20px;background:none;border:none;cursor:pointer;\">\n            <span style=\"font-weight:700;font-size:1.04rem;color:#11231F;\">{{ item.q }}<\u002Fspan>\n            <span style=\"flex:none;transform:{{ item.chevron }};transition:transform .25s;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#15786E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ item.isOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 20px 20px;color:#5C6A66;font-size:0.98rem;line-height:1.55;\">{{ item.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FINAL CTA ===================== -->\n<section id=\"waitlist\" style=\"background:#0E4D47;color:#EAF4F2;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(680px 380px at 15% 110%, rgba(224,148,46,0.18), transparent 60%),radial-gradient(620px 360px at 92% -10%, rgba(21,120,110,0.5), transparent 60%);pointer-events:none;\"><\u002Fdiv>\n  <div style=\"position:relative;max-width:760px;margin:0 auto;padding:clamp(64px,8vw,116px) 24px;text-align:center;\">\n    <h2 data-reveal=\"\" style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2rem,4.2vw,3.2rem);line-height:1.06;letter-spacing:-0.025em;color:#fff;margin:0 0 16px;text-wrap:balance;\">Stop chasing inquiries.<br>Start filling your calendar.<\u002Fh2>\n    <p data-reveal=\"\" data-reveal-delay=\"60\" style=\"font-size:clamp(1.05rem,1.6vw,1.24rem);color:#BFD6D1;max-width:520px;margin:0 auto 32px;\">Join the waitlist for early access and founder pricing. Be among the first venues to put booking on autopilot.<\u002Fp>\n\n    <div data-reveal=\"\" data-reveal-delay=\"120\" style=\"max-width:480px;margin:0 auto;\">\n      <sc-if value=\"{{ ctaNotSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <form onsubmit=\"{{ onCtaSubmit }}\" style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center;\">\n          <input type=\"email\" value=\"{{ ctaEmail }}\" oninput=\"{{ onCtaInput }}\" placeholder=\"you@yourvenue.com\" aria-label=\"Email address\" style=\"flex:1 1 220px;min-width:0;padding:15px 16px;border:1px solid rgba(255,255,255,0.18);border-radius:13px;font-size:1rem;color:#fff;background:rgba(255,255,255,0.08);outline:none;transition:border .15s, box-shadow .15s;\" style-focus=\"border:1px solid #E0942E;box-shadow:0 0 0 4px rgba(224,148,46,0.22);\">\n          <button type=\"submit\" style=\"display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#E0942E;color:#1c1206;font-weight:700;font-size:1rem;padding:15px 24px;border:none;border-radius:13px;cursor:pointer;box-shadow:0 8px 20px rgba(224,148,46,0.4);transition:transform .15s, background .15s;\" style-hover=\"transform:translateY(-1px);background:#EDA549;\">\n            Join the waitlist\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1c1206\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fform>\n        <sc-if value=\"{{ ctaHasError }}\" hint-placeholder-val=\"{{ false }}\">\n          <p style=\"color:#F6B6A8;font-size:0.88rem;font-weight:600;margin:12px 0 0;\">{{ ctaError }}<\u002Fp>\n        <\u002Fsc-if>\n        <p style=\"color:#8FB3AC;font-size:0.86rem;margin:16px 0 0;\">Be first to get early access. No spam — ever.<\u002Fp>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ ctaSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:20px;\">\n          <span style=\"flex:none;width:40px;height:40px;border-radius:50%;background:#E0942E;display:flex;align-items:center;justify-content:center;\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1c1206\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12.5l4 4L19 7\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <div style=\"text-align:left;\"><div style=\"font-weight:800;color:#fff;\">Welcome aboard.<\u002Fdiv><div style=\"font-size:0.9rem;color:#BFD6D1;\">You're on the early-access list. Watch your inbox.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== FOOTER ===================== -->\n<footer style=\"background:#0A3A35;color:#A9C6C0;\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:48px 24px;display:flex;flex-wrap:wrap;gap:28px;align-items:center;justify-content:space-between;\">\n    <div style=\"max-width:340px;\">\n      <a href=\"#hero\" style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;\">\n        <span style=\"width:28px;height:28px;border-radius:8px;background:#15786E;display:flex;align-items:center;justify-content:center;\"><span style=\"width:10px;height:10px;border-radius:50%;background:#E0942E;display:block;\"><\u002Fspan><\u002Fspan>\n        <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1.2rem;color:#fff;letter-spacing:-0.02em;\">Booqin<\u002Fspan>\n      <\u002Fa>\n      <p style=\"font-size:0.92rem;margin:0;color:#8FB3AC;\">The AI booking assistant for venue owners. List your space, fill more dates, do less work.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:28px;align-items:center;\">\n      <a href=\"#\" style=\"font-size:0.92rem;font-weight:600;color:#A9C6C0;transition:color .15s;\" style-hover=\"color:#fff;\">Privacy<\u002Fa>\n      <a href=\"#\" style=\"font-size:0.92rem;font-weight:600;color:#A9C6C0;transition:color .15s;\" style-hover=\"color:#fff;\">Contact<\u002Fa>\n      <a href=\"#waitlist\" style=\"font-size:0.92rem;font-weight:700;color:#F2C079;\">Join the waitlist<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:18px 24px;font-size:0.82rem;color:#6E928B;\">© 2026 Booqin. All rights reserved.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    isMobile: false,\n    navOpen: false,\n    heroEmail: '', heroError: '', heroSubmitted: false,\n    ctaEmail: '', ctaError: '', ctaSubmitted: false,\n    chatShown: 0, chatTyping: false,\n    openFaq: 0,\n  };\n\n  messages = [\n    { from: 'guest', name: 'Marcus T.', text: 'Hi! Is the Main Hall free for a wedding reception on Sat, Oct 18? About 120 guests.' },\n    { from: 'ai', text: 'Hi Marcus — yes, the Main Hall is open on Saturday, Oct 18. It comfortably seats up to 150, so 120 is a great fit.' },\n    { from: 'ai', text: 'For a Saturday evening reception (6 PM–midnight) the rate is $2,400, including setup and cleanup. Want me to hold the date for you?' },\n    { from: 'guest', name: 'Marcus T.', text: 'Yes please, that works for us.' },\n    { from: 'ai', text: \"Done — I've placed a 48-hour hold on Oct 18 and emailed you the booking link and floor plan. I'll follow up tomorrow if I don't hear back.\" },\n  ];\n\n  faqs = [\n    { q: 'When does early access open?', a: \"We're rolling out in waves through 2026. Join the waitlist and we'll email you the moment your spot is ready — early members get priority onboarding and founder pricing.\" },\n    { q: 'How much will Booqin cost?', a: \"Pricing isn't locked yet, but waitlist members lock in founder rates. There will be a free tier to list a single venue, with paid plans for multi-venue owners and higher inquiry volume.\" },\n    { q: 'Does the AI assistant work for any kind of venue?', a: 'Yes — event halls, studios, sports courts, meeting rooms, rooftops, anywhere people book by the hour or the day. You tell Booqin your spaces, rates, and rules, and it takes it from there.' },\n    { q: 'Will the assistant sound like my business?', a: \"It learns your venue's tone, policies, and FAQs, so replies feel like they came from your team — just faster. You can review and adjust anything before it goes live.\" },\n    { q: \"What happens to inquiries when I'm offline?\", a: \"That's the whole point. Booqin answers instantly, day or night, qualifies the lead, and holds the date — then hands you a confirmed, ready-to-pay booking in the morning.\" },\n  ];\n\n  componentDidMount() {\n    this.updateSize();\n    this._onResize = () => this.updateSize();\n    window.addEventListener('resize', this._onResize);\n    requestAnimationFrame(() => this.initReveal());\n    this.initChat();\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  updateSize() {\n    const m = window.innerWidth < 820;\n    if (m !== this.state.isMobile) this.setState({ isMobile: m, navOpen: false });\n  }\n\n  initReveal() {\n    if (!this.root) return;\n    const els = this.root.querySelectorAll('[data-reveal]');\n    els.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(22px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting) {\n          const el = e.target;\n          const d = el.getAttribute('data-reveal-delay') || 0;\n          el.style.transitionDelay = d + 'ms';\n          el.style.opacity = '1';\n          el.style.transform = 'none';\n          io.unobserve(el);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach((el) => io.observe(el));\n  }\n\n  initChat() {\n    if (!this.chatEl) { setTimeout(() => this.initChat(), 120); return; }\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((e) => {\n        if (e.isIntersecting && !this._chatStarted) {\n          this._chatStarted = true;\n          this.playChat();\n          io.disconnect();\n        }\n      });\n    }, { threshold: 0.35 });\n    io.observe(this.chatEl);\n  }\n\n  sleep(ms) { return new Promise((r) => setTimeout(r, ms)); }\n\n  async playChat() {\n    for (let i = 0; i < this.messages.length; i++) {\n      const m = this.messages[i];\n      if (m.from === 'ai') {\n        this.setState({ chatTyping: true });\n        await this.sleep(1150);\n        this.setState({ chatTyping: false });\n      } else {\n        await this.sleep(420);\n      }\n      this.setState({ chatShown: i + 1 });\n      await this.sleep(m.from === 'ai' ? 650 : 480);\n    }\n  }\n\n  rootRef = (el) => { this.root = el; };\n  chatRef = (el) => { this.chatEl = el; };\n  heroChatRef = (el) => {};\n\n  validate(v) { return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test((v || '').trim()); }\n\n  renderVals() {\n    const visibleChat = this.messages.slice(0, this.state.chatShown).map((m) => ({\n      text: m.text, name: m.name || '', isAI: m.from === 'ai', isGuest: m.from !== 'ai',\n    }));\n    const faqs = this.faqs.map((f, i) => ({\n      q: f.q, a: f.a,\n      isOpen: this.state.openFaq === i,\n      chevron: this.state.openFaq === i ? 'rotate(180deg)' : 'rotate(0deg)',\n      onToggle: () => this.setState((s) => ({ openFaq: s.openFaq === i ? -1 : i })),\n    }));\n    return {\n      isMobile: this.state.isMobile,\n      showDesktopNav: !this.state.isMobile,\n      navOpen: this.state.navOpen,\n      toggleNav: () => this.setState((s) => ({ navOpen: !s.navOpen })),\n      closeNav: () => this.setState({ navOpen: false }),\n      rootRef: this.rootRef, chatRef: this.chatRef, heroChatRef: this.heroChatRef,\n\n      heroEmail: this.state.heroEmail,\n      heroError: this.state.heroError, heroHasError: !!this.state.heroError,\n      heroSubmitted: this.state.heroSubmitted, heroNotSubmitted: !this.state.heroSubmitted,\n      onHeroInput: (e) => this.setState({ heroEmail: e.target.value, heroError: '' }),\n      onHeroSubmit: (e) => {\n        e.preventDefault();\n        if (!this.validate(this.state.heroEmail)) this.setState({ heroError: 'Please enter a valid email address.' });\n        else this.setState({ heroSubmitted: true });\n      },\n\n      ctaEmail: this.state.ctaEmail,\n      ctaError: this.state.ctaError, ctaHasError: !!this.state.ctaError,\n      ctaSubmitted: this.state.ctaSubmitted, ctaNotSubmitted: !this.state.ctaSubmitted,\n      onCtaInput: (e) => this.setState({ ctaEmail: e.target.value, ctaError: '' }),\n      onCtaSubmit: (e) => {\n        e.preventDefault();\n        if (!this.validate(this.state.ctaEmail)) this.setState({ ctaError: 'Please enter a valid email address.' });\n        else this.setState({ ctaSubmitted: true });\n      },\n\n      visibleChat, chatTyping: this.state.chatTyping,\n      faqs,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
